name: Daily Job Hunt

on:
  schedule:
    - cron: '0 22 * * 0-4'  # Mon–Fri 06:00 SGT (22:00 UTC Sun–Thu)
  workflow_dispatch:          # Manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  hunt:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run daily hunter
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MIN_SALARY: '8000'
          HOURS_BACK: '26'
        run: node daily-hunter.js

      - name: Commit dashboard + state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/index.html state/
          git diff --staged --quiet && echo "Nothing to commit" || \
            git commit -m "chore: daily refresh $(date -u '+%Y-%m-%d')"
          git push
