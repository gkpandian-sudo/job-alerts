name: Social Auto-Post (Instagram + LinkedIn)

on:
  schedule:
    - cron: '0 0 * * *'   # Daily 08:00 SGT (00:00 UTC) → top jobs with links
  workflow_dispatch:
    inputs:
      post_type:
        description: 'Post type: jobs | tip | weekly | monthly'
        required: false
        default: 'jobs'
      post_date:
        description: 'Override post date (YYYY-MM-DD). Leave blank for today.'
        required: false
        default: ''

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: social/requirements.txt

      - name: Install dependencies
        run: pip install -r social/requirements.txt

      - name: Generate image & post
        env:
          IG_USER_ID:             ${{ secrets.IG_USER_ID }}
          META_ACCESS_TOKEN:      ${{ secrets.META_ACCESS_TOKEN }}
          LINKEDIN_ACCESS_TOKEN:  ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_AUTHOR:        ${{ secrets.LINKEDIN_AUTHOR }}
          GITHUB_TOKEN:           ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY:      ${{ github.repository }}
          POST_TYPE:              ${{ github.event.inputs.post_type }}
          POST_DATE:              ${{ github.event.inputs.post_date }}
          BRAND_SITE:             ${{ secrets.BRAND_SITE }}
          BRAND_LINKEDIN:         ${{ secrets.BRAND_LINKEDIN }}
        run: python social/run.py

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: social-post-${{ github.run_id }}
          path: social/posts/
          retention-days: 30
